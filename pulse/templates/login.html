{% extends "base.html" %}
{% block title %}Connexion — Pulse{% endblock %}
{% block auth %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand brand-lg"><span class="brand-dot"></span> Pulse</div>
        <p class="muted">Votre veille IT, centralisée.</p>
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        <form action="/login" method="post">
            <label>Adresse e-mail
                <input type="email" name="email" required autofocus>
            </label>
            <label>Mot de passe
                <input type="password" name="password" required>
            </label>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
        <p class="muted small">Pas encore de compte ? <a href="/register">Créer un compte</a></p>
    </div>
</div>
{% endblock %}
